<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Tenor Calculator - VexFlow Natural Beam Fixed</title>
<script src="https://unpkg.com/vexflow@4.2.2/releases/vexflow-debug.js"></script>
<style>
:root{
  --bg:#101217; --panel:#1c212a; --panel2:#252b36; --panel3:#11151d;
  --text:#f2f4f8; --muted:#9aa4b5; --line:#3a4352;
  --accent:#4da3ff; --accentWeak:rgba(77,163,255,.22);
  --score:#fbfbf7; --hot:#e34848;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);user-select:none;-webkit-user-select:none;-webkit-text-size-adjust:100%}
input,select{user-select:text;-webkit-user-select:text}
#app{padding:14px}
.toolbar{display:grid;gap:8px;margin-bottom:12px}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px}
.row-title{min-width:72px;color:var(--muted);font-size:12px;font-weight:bold;letter-spacing:.04em;text-transform:uppercase}
label,.group-label{color:var(--muted);font-size:12px;margin-left:4px}
input,select{background:#101217;color:var(--text);border:1px solid #3a4250;border-radius:9px;padding:7px 9px;font-size:14px;outline:none}
input:focus,select:focus{border-color:var(--accent)}
#titleInput{width:260px}
button{cursor:pointer;border:1px solid #424a58;background:var(--panel2);color:var(--text);border-radius:10px;min-height:34px;min-width:56px;padding:7px 11px;font:400 14px Arial,sans-serif;line-height:1.2;touch-action:manipulation}
button:hover{border-color:var(--accent)}
button.active{background:var(--accent);border-color:var(--accent);color:#07101d;font-weight:bold;box-shadow:0 0 0 2px var(--accentWeak)}
.note-btn,.transport-btn,.view-btn,.short-btn{min-width:56px}
.icon-btn{display:flex;flex-direction:column;justify-content:center;align-items:center;gap:3px}
.icon-btn svg{width:18px;height:18px;display:block;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex:none}
.icon-btn .fill{fill:currentColor;stroke:none}
.icon-btn .btn-label{font-size:10px;line-height:1;letter-spacing:.01em}
.icon-btn.icon-only .btn-label{display:none}
.duration-btn .btn-label{font-size:9px}
.chord-preview{padding:7px 11px;border-radius:10px;background:var(--panel3);border:1px solid #475061;color:#78d66f;font-weight:bold;min-width:112px;text-align:center}
.rhythm-hint{color:var(--muted);font-size:12px;padding:0 6px}
#editorLayout{display:grid;grid-template-columns:148px minmax(0,1fr);gap:8px;align-items:start}
#scoreWrap{position:relative;background:var(--score);border:1px solid #3d4350;border-radius:12px;overflow:auto;max-height:calc(100vh - 315px);touch-action:none}
#scoreViewport{position:relative;width:100%;height:100%;min-height:760px;background:var(--score);overflow:hidden}
#scoreSurface{position:relative;background:var(--score);min-height:760px;transform-origin:0 0;will-change:transform}
#vfCanvas{position:absolute;left:0;top:0}
#hitLayer{position:absolute;left:0;top:0;pointer-events:auto;touch-action:none}
.measure-hit{position:absolute;background:rgba(255,255,255,.001);border:0;pointer-events:auto;touch-action:none}
.measure-hit:hover{background:rgba(77,163,255,.04)}
.event-hit{position:absolute;background:rgba(255,255,255,.001);border-radius:6px;pointer-events:auto;touch-action:none}
.event-hit:hover{outline:1px solid rgba(77,163,255,.35)}
.event-hit.selected{outline:2px solid rgba(227,72,72,.75)}
.event-hit.multi-selected{outline:2px dashed rgba(227,72,72,.85)}
.chord-hit{position:absolute;background:rgba(255,255,255,.001);border-radius:5px;pointer-events:auto;touch-action:none}
.chord-hit:hover{outline:1px solid rgba(77,163,255,.45);background:rgba(77,163,255,.05)}
.chord-hit.selected{outline:2px solid rgba(227,72,72,.8);background:rgba(227,72,72,.08)}
.selection-box{position:absolute;border:1px dashed rgba(77,163,255,.95);background:rgba(77,163,255,.16);pointer-events:none;z-index:50}
.playhead{position:absolute;border-left:3px solid var(--hot);height:86px;pointer-events:none}
.score-title{
  position:absolute;
  left:0;
  top:22px;
  width:100%;
  text-align:center;
  color:#111;
  font:700 24px Arial, sans-serif;
  pointer-events:none;
}
.score-meta{
  position:absolute;
  left:42px;
  top:58px;
  color:#333;
  font:400 13px Arial, sans-serif;
  pointer-events:none;
}
#errorBox{display:none;background:#2b1111;color:#ffcaca;border:1px solid #6a2424;border-radius:10px;padding:12px;margin-bottom:12px}
#status{margin-top:8px;font-size:12px;color:var(--muted)}
#notesPanel{display:block;padding:12px}
#notesPanel .row-title{min-width:100%;margin-bottom:4px}
.notes-stack{display:grid;gap:10px}
.play-main{display:flex;gap:8px;flex-wrap:wrap;align-items:center;width:100%}
.play-settings{display:none;gap:8px;flex-wrap:wrap;align-items:center;width:100%;padding-top:4px;border-top:1px solid #2f3744;margin-top:2px}
.play-settings.open{display:flex}
.notes-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.notes-col{display:grid;gap:6px}
.notes-group{display:grid;gap:6px}
.notes-delete{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.notes-inline2{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.notes-inline3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
@media (max-width: 820px){
  #app{padding:10px}
  .toolbar{gap:6px;margin-bottom:8px}
  #editorLayout{grid-template-columns:1fr}
  .row{gap:6px;padding:8px;border-radius:10px}
  .row-title{min-width:100%;margin-bottom:2px}
  label,.group-label{font-size:11px;margin-left:0}
  input,select{font-size:16px;padding:8px 9px}
  button{min-height:40px;padding:8px 10px}
  button{min-width:56px}
  #titleInput{width:min(100%, 220px)}
  #scoreWrap{height:64vh;max-height:none;min-height:420px}
  #scoreViewport{min-height:420px}
}
@media (max-width: 520px){
  #app{padding:8px}
  .row{padding:7px}
  #scoreWrap{height:68vh;min-height:460px}
  #scoreViewport{min-height:460px}
}
</style>
</head>
<body>
<div id="app">
  <div id="errorBox"></div>

  <div class="toolbar">
    <div class="row" id="songRow">
      <button id="newBtn">New</button>
      <button id="saveBrowserBtn">Save</button>
      <button id="loadBrowserBtn">Open</button>
      <label>Title</label><input id="titleInput" type="text" value="Untitled Song" />
      <label>Key</label>
      <select id="keyRootSelect">
        <option>C</option><option>C#</option><option>Db</option><option>D</option><option>D#</option><option>Eb</option>
        <option>E</option><option>F</option><option>F#</option><option>Gb</option><option>G</option><option>G#</option>
        <option>Ab</option><option>A</option><option>A#</option><option>Bb</option><option>B</option><option>Cb</option>
      </select>
      <select id="keyModeSelect"><option value="major">Major</option><option value="minor">Minor</option></select>
      <label>Time</label>
      <select id="timeSelect"><option>4/4</option><option>3/4</option><option>2/4</option><option>6/8</option><option>9/8</option><option>12/8</option></select>
      <label>Tempo</label><input id="tempoInput" type="number" min="30" max="240" value="90" style="width:78px" />
      <span class="group-label">Style</span>
      <select id="styleSelect">
        <option value="pop">Pop Basic</option>
        <option value="kpop">K-Pop / Ballad</option>
        <option value="ccm" selected>CCM Worship</option>
        <option value="markers">Markers Worship KR</option>
        <option value="gospel">Contemporary Gospel</option>
        <option value="tight">Tight 3-Part</option>
        <option value="open">Open 3-Part</option>
      </select>
      <button id="reharmonizeBtn">적용</button>
      <button id="undoBtn" title="Undo">Undo</button>
      <button id="redoBtn" title="Redo">Redo</button>
      <button id="copyBtn">Copy</button>
      <button id="pasteBtn">Paste</button>
      <input id="uploadJsonInput" type="file" accept=".json" style="display:none" />
    </div>

    <div class="row" id="chordRow">
      <div class="row-title">Chord</div>
      <select id="chordRootSelect">
        <option>C</option><option>C#</option><option>Db</option><option>D</option><option>D#</option><option>Eb</option>
        <option>E</option><option>F</option><option>F#</option><option>Gb</option><option>G</option><option>G#</option>
        <option>Ab</option><option>A</option><option>A#</option><option>Bb</option><option>B</option><option>Cb</option>
      </select>
      <select id="chordTypeSelect">
        <option value="maj">Major</option><option value="m">Minor</option><option value="dom7">Dominant 7</option>
        <option value="maj7">Major 7</option><option value="m7">Minor 7</option><option value="mMaj7">Minor Maj7</option>
        <option value="dim">Diminished</option><option value="dim7">Diminished 7</option><option value="m7b5">Half-dim 7</option>
        <option value="aug">Augmented</option><option value="sus2">sus2</option><option value="sus4">sus4</option><option value="7sus4">7sus4</option>
      </select>
      <select id="chordFlavorSelect"></select>
      <label>/</label>
      <select id="slashBassSelect">
        <option value="">None</option><option>C</option><option>C#</option><option>Db</option><option>D</option><option>D#</option><option>Eb</option>
        <option>E</option><option>F</option><option>F#</option><option>Gb</option><option>G</option><option>G#</option><option>Ab</option>
        <option>A</option><option>A#</option><option>Bb</option><option>B</option>
      </select>
      <div id="chordPreview" class="chord-preview">C</div>
      <button id="applyChordBtn">Add</button>
      <button id="removeChordBtn">Del</button>
      <button class="view-btn voice-view active" data-voice="all">ALL</button>
      <button class="view-btn voice-view active" data-voice="melody">Mel</button>
      <button class="view-btn voice-view active" data-voice="tenor">Ten</button>
      <button class="view-btn voice-view active" data-voice="alto">Alt</button>
      <button id="rewindBtn" class="transport-btn compact-btn">RW</button>
      <button id="playBtn" class="transport-btn compact-btn">PLAY</button>
      <button id="stopBtn" class="transport-btn compact-btn">STOP</button>
      <button id="downloadAudioBtn">Wav</button>
      <button id="playSettingsBtn">Setting</button>
      <div id="playSettingsPanel" class="play-settings">
        <label>Inst</label>
        <select id="melodyInstrumentSelect">
          <option value="piano">Piano</option>
          <option value="electricPiano">E.Piano</option>
          <option value="organ">Organ</option>
          <option value="synthLead">Synth</option>
          <option value="choir">Choir</option>
          <option value="strings">Strings</option>
        </select>
        <label>Pad Inst</label>
        <select id="chordPadInstrumentSelect">
          <option value="synthPad" selected>Synth Pad</option>
          <option value="piano">Piano</option>
          <option value="electricPiano">E.Piano</option>
          <option value="organ">Organ</option>
          <option value="choir">Choir</option>
          <option value="strings">Strings</option>
        </select>
        <label>Pad Vol</label>
        <input id="chordPadVolumeSlider" type="range" min="0" max="1" step="0.01" value="0.38" style="width:60px;" />
        <span id="chordPadVolumeValue" style="color:var(--muted);font-size:12px;">38%</span>
        <label>Master Vol</label>
        <input id="masterVolumeSlider" type="range" min="0" max="1" step="0.01" value="0.82" style="width:120px;" />
        <span id="masterVolumeValue" style="color:var(--muted);font-size:12px;">82%</span>
      </div>
    </div>
  </div>

  <div id="editorLayout">
    <div class="row" id="notesPanel">
      <div class="row-title">Notes</div>
      <div class="notes-stack">
        <div class="notes-row2">
          <button id="pencilModeBtn" class="note-btn compact-btn active" title="Draw mode">Draw</button>
          <button id="selectModeBtn" class="note-btn compact-btn" title="Select mode">Sel</button>
        </div>
        <div class="notes-grid">
          <div class="notes-col">
            <span class="group-label">Rest</span>
            <button class="note-btn duration-btn rest-length" data-duration="4">R1</button>
            <button class="note-btn duration-btn rest-length" data-duration="2">R2</button>
            <button class="note-btn duration-btn rest-length" data-duration="1">R4</button>
            <button class="note-btn duration-btn rest-length" data-duration="0.5">R8</button>
            <button class="note-btn duration-btn rest-length" data-duration="0.25">R16</button>
            <button class="note-btn duration-btn rest-length" data-duration="0.125">R32</button>
          </div>
          <div class="notes-col">
            <span class="group-label">Note</span>
            <button class="note-btn duration-btn note-length" data-duration="4">1n</button>
            <button class="note-btn duration-btn note-length" data-duration="2">2n</button>
            <button class="note-btn duration-btn note-length active" data-duration="1">4n</button>
            <button class="note-btn duration-btn note-length" data-duration="0.5">8n</button>
            <button class="note-btn duration-btn note-length" data-duration="0.25">16n</button>
            <button class="note-btn duration-btn note-length" data-duration="0.125">32n</button>
          </div>
        </div>
        <div class="notes-group">
          <span class="group-label">Dot / Tuplet</span>
          <div class="notes-inline2">
            <button class="note-btn compact-btn dot-mode active" data-dot="0">Base</button>
            <button class="note-btn compact-btn dot-mode" data-dot="1">.</button>
            <button class="note-btn compact-btn dot-mode" data-dot="2">..</button>
            <button id="tripletBtn" class="note-btn compact-btn" title="Tuplet">3</button>
          </div>
        </div>
        <div class="notes-group">
          <span class="group-label">Accidental</span>
          <div class="notes-inline2">
            <button class="note-btn accidental-mode active" data-accidental="auto">Auto</button>
            <button class="note-btn compact-btn accidental-mode" data-accidental="natural">Nat</button>
            <button class="note-btn compact-btn accidental-mode" data-accidental="sharp">#</button>
            <button class="note-btn compact-btn accidental-mode" data-accidental="flat">b</button>
          </div>
        </div>
        <div class="notes-group">
          <span class="group-label">Mark</span>
          <div class="notes-row2">
            <button id="tieToggleBtn" class="note-btn compact-btn" title="Tie to next note">Tie</button>
            <button id="fermataToggleBtn" class="note-btn compact-btn" title="Fermata">Hold</button>
          </div>
        </div>
        <div class="notes-group">
          <span class="group-label">Delete</span>
          <div class="notes-delete">
            <button id="deleteSelectedBtn" class="short-btn">Select</button>
            <button id="deleteBtn" class="short-btn">Last</button>
          </div>
        </div>
      </div>
    </div>
    <div id="scoreWrap">
      <div id="scoreViewport">
        <div id="scoreSurface">
          <div id="vfCanvas"></div>
          <div id="hitLayer"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="status"></div>
</div>

}

function getKeyDisplay(){
  return `${state.keyRoot} ${state.keyMode === 'minor' ? 'Minor' : 'Major'}`;
}

function keySigCount(){
  return KEY_SIG_COUNTS[`${state.keyRoot}:${state.keyMode}`] || 0;
}

function keyAcc(){
  const c = keySigCount();
  const acc = {};
  if(c > 0){
    for(let i=0;i<c;i++) acc[SHARP_ORDER[i]] = 1;
  }else if(c < 0){
    for(let i=0;i<Math.abs(c);i++) acc[FLAT_ORDER[i]] = -1;
  }
  return acc;
}

function vexKey(){
  return state.keyRoot + (state.keyMode === 'minor' ? 'm' : '');
}

function measureBeats(){
  const [n,d] = state.timeSig.split('/').map(Number);
  return n * (4 / d);
}

function quantizeBeatValue(value){
  const step = 1 / 12;
  return Math.round(value / step) * step;
}

function inputDuration(){
  let m = 1;
  if(state.dotMode === 1) m = 1.5;
  if(state.dotMode === 2) m = 1.75;
  if(state.triplet) m *= 2 / 3;
  return quantizeBeatValue(state.duration * m);
}

function totalBeats(){
  const {measuresPerSystem} = layoutMetrics();
  let t = measuresPerSystem * DEFAULT_SYSTEMS * measureBeats();
  for(const e of state.events) t = Math.max(t, e.startBeat + e.duration);
  return t;
}

function measureCount(){
  const {measuresPerSystem} = layoutMetrics();
  return Math.max(measuresPerSystem * DEFAULT_SYSTEMS, Math.ceil(totalBeats() / measureBeats()));
}

function systemCount(){
  const {measuresPerSystem} = layoutMetrics();
  return Math.max(DEFAULT_SYSTEMS, Math.ceil(measureCount() / measuresPerSystem));
}

function viewportWidthSafe(){
  const docWidth = document.documentElement ? document.documentElement.clientWidth : 0;
  const wrapWidth = scoreWrap ? scoreWrap.clientWidth : 0;
  return Math.max(window.innerWidth || 0, docWidth, wrapWidth, 390);
}

function layoutMetrics(){
  const viewportWidth = viewportWidthSafe();
  const compactMobile = viewportWidth <= 520;
  const mobile = viewportWidth <= 820;

  return {
    mobile,
    compactMobile,
    measuresPerSystem: compactMobile ? 2 : (mobile ? 3 : MEASURES_PER_SYSTEM),
    pageLeft: compactMobile ? 18 : (mobile ? 24 : DESKTOP_PAGE_LEFT),
    staffTop: compactMobile ? 92 : (mobile ? 98 : DESKTOP_STAFF_TOP),
    systemGap: compactMobile ? 136 : (mobile ? 142 : DESKTOP_SYSTEM_GAP),
    measureMinW: compactMobile ? 178 : (mobile ? 166 : DESKTOP_MEASURE_MIN_W),
    firstMeasureExtraW: compactMobile ? 44 : (mobile ? 52 : DESKTOP_FIRST_MEASURE_EXTRA_W),
    fixedNoteGapW: compactMobile ? 34 : (mobile ? 31 : DESKTOP_FIXED_NOTE_GAP_W),
    rightPad: compactMobile ? 18 : (mobile ? 28 : DESKTOP_RIGHT_PAD),
    minScoreWidth: compactMobile ? Math.max(viewportWidth - 16, 320) : (mobile ? Math.max(viewportWidth - 20, 420) : 1040)
  };
}

function viewportSize(){
  return {
    width: Math.max(scoreWrap ? scoreWrap.clientWidth : 0, 320),
    height: Math.max(scoreWrap ? scoreWrap.clientHeight : 0, 320)
  };
}

function fitBaseScale(contentWidth){
  const {width} = viewportSize();
  if(!contentWidth) return 1;
  return clamp((width - 6) / contentWidth, 0.55, 1);
}

function clampViewPan(){
  const {width: viewportW, height: viewportH} = viewportSize();
  const scaledW = viewState.contentWidth * viewState.scale;
  const scaledH = viewState.contentHeight * viewState.scale;

  if(scaledW <= viewportW){
    viewState.panX = 0;
  }else{
    viewState.panX = clamp(viewState.panX, viewportW - scaledW, 0);
  }

  if(scaledH <= viewportH){
    viewState.panY = 0;
  }else{
    viewState.panY = clamp(viewState.panY, viewportH - scaledH, 0);
  }
}

function applyViewTransform(){
  if(!scoreSurface) return;
  const s = viewState.scale || 1;
  scoreSurface.style.transform = `matrix(${s},0,0,${s},${Math.round(viewState.panX)},${Math.round(viewState.panY)})`;
}

function updateViewState(contentWidth, contentHeight){
  viewState.contentWidth = contentWidth;
  viewState.contentHeight = contentHeight;
  viewState.baseScale = fitBaseScale(contentWidth);

  if(!viewState.userInteracted){
    viewState.userScale = 1;
    viewState.panX = 0;
    viewState.panY = 0;
  }

  viewState.scale = clamp(viewState.baseScale * viewState.userScale, 0.55, 4.5);
  clampViewPan();
  applyViewTransform();
}

function resetResponsiveView(){
  viewState.userInteracted = false;
  viewState.userScale = 1;
  viewState.panX = 0;
  viewState.panY = 0;
}

function clientPointToScore(clientX, clientY){
  const rect = scoreSurface.getBoundingClientRect();
  return {
    x: (clientX - rect.left) / (viewState.scale || 1),
    y: (clientY - rect.top) / (viewState.scale || 1)
  };
}

function touchDistance(t1, t2){
  const dx = t2.clientX - t1.clientX;
  const dy = t2.clientY - t1.clientY;
  return Math.hypot(dx, dy);
}

function touchCenter(t1, t2){
  return {
    x: (t1.clientX + t2.clientX) / 2,
    y: (t1.clientY + t2.clientY) / 2
  };
}

function beginTouchGesture(touches){
  if(touches.length < 2) return;
  const t1 = touches[0];
  const t2 = touches[1];
  const center = touchCenter(t1, t2);
  const point = clientPointToScore(center.x, center.y);

  touchGesture.active = true;
  touchGesture.startDistance = Math.max(1, touchDistance(t1, t2));
  touchGesture.startUserScale = viewState.userScale;
  touchGesture.contentX = point.x;
  touchGesture.contentY = point.y;
  viewState.gestureActive = true;
  drag = {active:false,id:null,historyPushed:false};
  selectionDrag.active = false;
}

function moveTouchGesture(touches){
  if(!touchGesture.active || touches.length < 2) return;

  const t1 = touches[0];
  const t2 = touches[1];
  const center = touchCenter(t1, t2);
  const distance = Math.max(1, touchDistance(t1, t2));
  const wrapRect = scoreWrap.getBoundingClientRect();
  const ratio = distance / Math.max(1, touchGesture.startDistance);

  viewState.userInteracted = true;
  viewState.userScale = clamp(touchGesture.startUserScale * ratio, 1, 4.5 / Math.max(viewState.baseScale, 0.55));
  viewState.scale = clamp(viewState.baseScale * viewState.userScale, 0.55, 4.5);
  viewState.panX = center.x - wrapRect.left - touchGesture.contentX * viewState.scale;
  viewState.panY = center.y - wrapRect.top - touchGesture.contentY * viewState.scale;
  clampViewPan();
  applyViewTransform();
}

function endTouchGesture(){
  touchGesture.active = false;
  viewState.gestureActive = false;
}

function eventById(id){
  return state.events.find(e=>e.id===id) || null;
}

function ensureSelectionState(){
  if(!Array.isArray(state.selectedIds)){
    state.selectedIds = state.selectedId === null || state.selectedId === undefined ? [] : [state.selectedId];
  }

  state.selectedIds = state.selectedIds.filter(id => !!eventById(id));

  if(state.selectedIds.length === 0){
    state.selectedId = null;
  }else if(state.selectedId === null || !state.selectedIds.includes(state.selectedId)){
    state.selectedId = state.selectedIds[state.selectedIds.length - 1];
  }
}


function ensureChordSelectionState(){
  if(!Array.isArray(state.selectedChordIds)) state.selectedChordIds = [];
  state.selectedChordIds = state.selectedChordIds.filter(id => {
    const e = eventById(id);
    return !!(e && e.chord);
  });
}

function isChordSelected(id){
  ensureChordSelectionState();
  return state.selectedChordIds.includes(id);
}

function selectedChordEvents(){
  ensureChordSelectionState();
  return state.events
    .filter(e => state.selectedChordIds.includes(e.id) && e.chord)
    .sort((a,b)=>a.startBeat-b.startBeat || a.id-b.id);
}

function setChordSelection(ids){
  const unique = [...new Set(ids)].filter(id => {
    const e = eventById(id);
    return !!(e && e.chord);
  });
  state.selectedChordIds = unique;
}

function toggleChordSelection(id){
  ensureChordSelectionState();
  if(state.selectedChordIds.includes(id)){
    state.selectedChordIds = state.selectedChordIds.filter(x => x !== id);
  }else{
    const e = eventById(id);
    if(e && e.chord) state.selectedChordIds.push(id);
  }
}

function clearChordSelection(){
  state.selectedChordIds = [];
}

function selectedEvent(){
  ensureSelectionState();
  return state.selectedId === null ? null : eventById(state.selectedId);
}

function isSelected(id){
  ensureSelectionState();
  return state.selectedIds.includes(id);
}

function selectedEvents(){
  ensureSelectionState();
  return state.events
    .filter(e => state.selectedIds.includes(e.id))
    .sort((a,b)=>a.startBeat-b.startBeat || a.id-b.id);
}

function setSelection(ids){
  const unique = [...new Set(ids)].filter(id => !!eventById(id));
  state.selectedIds = unique;
  state.selectedId = unique.length ? unique[unique.length - 1] : null;
}

function toggleSelection(id){
  ensureSelectionState();

  if(state.selectedIds.includes(id)){
    state.selectedIds = state.selectedIds.filter(x => x !== id);
  }else{
    state.selectedIds.push(id);
  }

  state.selectedId = state.selectedIds.length ? state.selectedIds[state.selectedIds.length - 1] : null;
}

function clearSelection(){
  state.selectedIds = [];
  state.selectedId = null;
}

function setButtonIcon(button, iconKey, label, iconOnly=false){
  if(!button || !ICON_SVGS[iconKey]) return;
  button.classList.add('icon-btn');
  if(iconOnly) button.classList.add('icon-only');
  else button.classList.remove('icon-only');
  button.innerHTML = `${ICON_SVGS[iconKey]}<span class="btn-label">${label || ''}</span>`;
}

function hydrateNotationIcons(){
  setButtonIcon(document.getElementById('rewindBtn'), 'rewind', 'RW');
  setButtonIcon(document.getElementById('playBtn'), 'play', 'PLAY');
  setButtonIcon(document.getElementById('stopBtn'), 'stop', 'STOP');
  setButtonIcon(document.getElementById('playSettingsBtn'), 'settings', 'SET');
}

function snapshotForHistory(){
  return JSON.stringify({
    state: JSON.parse(JSON.stringify(state)),
    nextId
  });
}

function restoreSnapshot(snapshot){
  const data = JSON.parse(snapshot);
  state = data.state;
  nextId = data.nextId || nextId;
  normalize();
}

function pushHistory(){
  undoStack.push(snapshotForHistory());
  if(undoStack.length > 10) undoStack.shift();
  redoStack = [];
  updateUndoRedoButtons();
}

function undo(){
  if(!undoStack.length) return;
  redoStack.push(snapshotForHistory());
  const snap = undoStack.pop();
  restoreSnapshot(snap);
  render();
}

function redo(){
  if(!redoStack.length) return;
  undoStack.push(snapshotForHistory());
  if(undoStack.length > 10) undoStack.shift();
  const snap = redoStack.pop();
  restoreSnapshot(snap);
  render();
}

function updateUndoRedoButtons(){
  const undoBtn = document.getElementById('undoBtn');
  const redoBtn = document.getElementById('redoBtn');

  if(undoBtn) undoBtn.disabled = undoStack.length === 0;
  if(redoBtn) redoBtn.disabled = redoStack.length === 0;
}

function setEditMode(mode){
  state.editMode = mode === 'select' ? 'select' : 'draw';

  const pencil = document.getElementById('pencilModeBtn');
  const select = document.getElementById('selectModeBtn');

  if(pencil) pencil.classList.toggle('active', state.editMode === 'draw');
  if(select) select.classList.toggle('active', state.editMode === 'select');

  updateStatus();
}

function getAppendBeat(){
  if(!state.events.length) return 0;

  let end = 0;
  for(const e of state.events){
    end = Math.max(end, e.startBeat + e.duration);
  }

  end = Math.round(end * 1000) / 1000;

  const mb = measureBeats();
  const dur = inputDuration();
  const local = localBeat(end);

  // 현재 마디에 선택한 음표/쉼표가 들어가면 그대로 append.
  // 들어가지 않으면 다음 마디 첫 박자로 넘긴다.
  if(local > 0.0001 && local + dur > mb + 0.0001){
    return (Math.floor(end / mb) + 1) * mb;
  }

  return end;
}

function stripGeneratedHarmony(event){
  const e = JSON.parse(JSON.stringify(event));
  delete e.tenor;
  delete e.alto;
  return e;
}

function copySelectedEvents(){
  const sel = selectedEvents();
  if(!sel.length) return;

  const minBeat = Math.min(...sel.map(e => e.startBeat));
  copiedEvents = sel.map(e => {
    const c = stripGeneratedHarmony(e);
    c.relativeStartBeat = e.startBeat - minBeat;
    return c;
  });
  copiedMode = 'events';

  updateStatus();
}

function copySelectedChords(){
  const sel = selectedChordEvents();
  if(!sel.length) return;

  const minBeat = Math.min(...sel.map(e => e.startBeat));
  copiedChordItems = sel.map(e => ({
    chord: e.chord,
    relativeStartBeat: e.startBeat - minBeat
  }));
  copiedMode = 'chords';

  updateStatus();
}

function pasteCopiedEvents(){
  if(!copiedEvents.length) return;

  pushHistory();

  const base = getAppendBeat();
  const newIds = [];

  for(const item of copiedEvents){
    const e = JSON.parse(JSON.stringify(item));
    delete e.relativeStartBeat;
    e.id = nextId++;
    e.startBeat = base + (item.relativeStartBeat || 0);
    delete e.tenor;
    delete e.alto;

    state.events.push(e);
    newIds.push(e.id);
  }

  sortEvents();
  setSelection(newIds);
  clearChordSelection();
  render();
}

function targetEventsForChordPaste(){
  const chordTargets = selectedChordEvents();
  if(chordTargets.length) return chordTargets;

  const noteTargets = selectedEvents();
  if(noteTargets.length) return noteTargets;

  return [];
}

function findEventForBeat(beat){
  const sorted = getSortedEvents();
  let exact = sorted.find(e => Math.abs(e.startBeat - beat) < 0.001);
  if(exact) return exact;

  let following = sorted.find(e => e.startBeat >= beat - 0.001);
  if(following) return following;

  return null;
}

function pasteCopiedChords(){
  if(!copiedChordItems.length) return;

  pushHistory();

  const targets = targetEventsForChordPaste();
  const changedIds = [];

  if(targets.length){
    const sortedTargets = [...targets].sort((a,b)=>a.startBeat-b.startBeat || a.id-b.id);

    for(let i=0; i<sortedTargets.length; i++){
      const item = copiedChordItems.length === 1 ? copiedChordItems[0] : copiedChordItems[i % copiedChordItems.length];
      sortedTargets[i].chord = item.chord;
      changedIds.push(sortedTargets[i].id);
    }
  }else{
    const base = getAppendBeat();

    for(const item of copiedChordItems){
      const target = findEventForBeat(base + (item.relativeStartBeat || 0));
      if(target){
        target.chord = item.chord;
        changedIds.push(target.id);
      }
    }
  }

  if(changedIds.length){
    clearSelection();
    setChordSelection(changedIds);
  }

  render();
}

function sortEvents(){
  state.events.sort((a,b)=>a.startBeat-b.startBeat || a.id-b.id);
}

function measureOfBeat(beat){
  return Math.floor(beat / measureBeats());
}

function localBeat(beat){
  const mb = measureBeats();
  return beat - Math.floor(beat / mb) * mb;
}

function eventsInMeasure(m){
  return state.events
    .filter(e => measureOfBeat(e.startBeat) === m)
    .sort((a,b)=>a.startBeat-b.startBeat || a.id-b.id);
}

function buildLayout(){
  const metrics = layoutMetrics();
  const {measuresPerSystem, measureMinW, firstMeasureExtraW, fixedNoteGapW, pageLeft, staffTop, systemGap, rightPad} = metrics;
  const mc = measureCount();
  const widths = [];

  // 각 마디 폭은 박자 길이가 아니라, 실제 음표/쉼표 이벤트 개수 기준이다.
  // 16분음표라고 더 붙거나, 긴 음표라고 더 벌어지지 않는다.
  for(let m=0; m<mc; m++){
    const events = eventsInMeasure(m);
    const extra = (m % measuresPerSystem === 0 ? firstMeasureExtraW : 0);
    const eventCount = Math.max(1, events.length);

    widths[m] = Math.max(
      measureMinW + extra,
      extra + 92 + eventCount * fixedNoteGapW
    );
  }

  // 각 행의 총 길이를 구한 뒤, 가장 긴 행에 맞춰 짧은 행은 마지막 마디만 늘린다.
  const rowWidths = [];
  for(let s=0; s<systemCount(); s++){
    const first = s * measuresPerSystem;
    const last = Math.min(first + measuresPerSystem, mc) - 1;
    let rowWidth = 0;

    for(let m=first; m<=last; m++){
      rowWidth += widths[m];
    }

    rowWidths[s] = rowWidth;
  }

  const maxRowWidth = Math.max(...rowWidths, 0);

  for(let s=0; s<systemCount(); s++){
    const first = s * measuresPerSystem;
    const last = Math.min(first + measuresPerSystem, mc) - 1;

    if(last >= first){
      const diff = maxRowWidth - rowWidths[s];
      if(diff > 0.001) widths[last] += diff;
    }
  }

  const systems = [];
  let scoreWidth = 0;

  for(let s=0; s<systemCount(); s++){
    const first = s * measuresPerSystem;
    const last = Math.min(first + measuresPerSystem, mc) - 1;
    let x = pageLeft;
    const starts = {};

    for(let m=first; m<=last; m++){
      starts[m] = x;
      x += widths[m];
    }

    systems[s] = {first,last,x:pageLeft,y:staffTop + s*systemGap,width:x-pageLeft,starts};
    scoreWidth = Math.max(scoreWidth, x + rightPad);
  }

  return {measureCount:mc,widths,systems,scoreWidth};
}

function diToKey(di){
  const letter = LETTERS[mod(di,7)].toLowerCase();
  const octave = 4 + Math.floor(di/7);
  return `${letter}/${octave}`;
}

function diLetter(di){
  return LETTERS[mod(di,7)];
}

function accidentalOffset(accidental, keyOffset){
  if(accidental === 'natural') return 0;
  if(accidental === 'sharp') return 1;
  if(accidental === 'flat') return -1;
  return keyOffset || 0;
}

function diToMidi(di, accidental='auto'){
  const letter = diLetter(di);
  const octave = 4 + Math.floor(di/7);
  const acc = accidentalOffset(accidental, keyAcc()[letter] || 0);
  return 12*(octave+1) + LETTER_PC[letter] + acc;
}

function midiToDi(midi){
  const pc = mod(midi,12);
  const octave = Math.floor(midi/12)-1;
  for(const letter of LETTERS){
    const acc = keyAcc()[letter] || 0;
    if(mod(LETTER_PC[letter]+acc,12) === pc){
      return (octave-4)*7 + LETTERS.indexOf(letter);
    }
  }

  let best = 0, dist = 999;
  for(let di=-28; di<=36; di++){
    const d = Math.abs(diToMidi(di)-midi);
    if(d < dist){ dist=d; best=di; }
  }
  return best;
}

function accidentalGlyph(acc){
  if(acc === 'natural') return 'n';
  if(acc === 'sharp') return '#';
  if(acc === 'flat') return 'b';
  if(acc === 'doubleSharp') return '##';
  if(acc === 'doubleFlat') return 'bb';
  return null;
}

function normalizePitchOffset(offset){
  let o = offset;
  while(o > 6) o -= 12;
  while(o < -6) o += 12;
  return o;
}

function accidentalForMidiAtDi(midi, di){
  // VexFlow의 key는 오선상의 음 이름이다.
  // 예: F#을 f/4로 그리면 반드시 # Accidental을 붙여야 한다.
  // 조표에 이미 들어있는 변화음이면 표기하지 않고,
  // 조표와 다른 변화가 필요할 때만 natural / sharp / flat을 붙인다.
  const letter = diLetter(di);
  const octave = 4 + Math.floor(di / 7);
  const naturalMidi = 12 * (octave + 1) + LETTER_PC[letter];
  const wantedOffset = normalizePitchOffset(midi - naturalMidi);
  const keyOffset = keyAcc()[letter] || 0;

  if(wantedOffset === keyOffset) return 'auto';
  if(wantedOffset === 0) return 'natural';
  if(wantedOffset === 1) return 'sharp';
  if(wantedOffset === -1) return 'flat';
  if(wantedOffset === 2) return 'doubleSharp';
  if(wantedOffset === -2) return 'doubleFlat';

  return 'auto';
}

function durationToVex(base, rest=false){
  let d;
  if(base >= 4) d='w';
  else if(base >= 2) d='h';
  else if(base >= 1) d='q';
  else if(base >= .5) d='8';
  else if(base >= .25) d='16';
  else if(base >= .125) d='32';
  else d='64';
  return rest ? d+'r' : d;
}

function splitDuration(beats){
  const out = [];
  let b = beats;
  const parts = [4,2,1,.5,.25,.125];
  while(b > .0001){
    let found = false;
    for(const p of parts){
      if(b >= p - .0001){
        out.push(p);
        b -= p;
        found = true;
        break;
      }
    }
    if(!found){
      out.push(.125);
      break;
    }
  }
  return out;
}

function addDots(note, count){
  for(let i=0;i<count;i++){
    try{
      if(note.addDotToAll) note.addDotToAll();
      else note.addDot(0);
    }catch(e){}
  }
}

function addAccidental(note, index, acc){
  const g = accidentalGlyph(acc);
  if(!g) return;

  try{
    const a = new VF.Accidental(g);
    try{ note.addModifier(a, index); }
    catch(e1){ note.addModifier(index, a); }
  }catch(e){}
}

function addChordAnnotation(note, text){
  if(!text) return;

  try{
    const ann = new VF.Annotation(text)
      .setFont('Arial', 13, 'bold')
      .setVerticalJustification(VF.Annotation.VerticalJustify.TOP);
    try{ note.addModifier(ann,0); }
    catch(e1){ note.addModifier(0,ann); }
  }catch(e){}
}

function getChordText(){
  const rule = CHORD_RULES[chordTypeSelect.value] || CHORD_RULES.maj;
  return chordRootSelect.value + rule.symbol +
    (chordFlavorSelect.value || '') +
    (slashBassSelect.value ? '/' + slashBassSelect.value : '');
}

function updateChordOptions(){
  const rule = CHORD_RULES[chordTypeSelect.value] || CHORD_RULES.maj;
  const current = chordFlavorSelect.value;
  const flavors = [...new Set(['', ...(rule.exts || []), ...(rule.adds || []), ...(rule.alters || [])])];
  chordFlavorSelect.innerHTML = '';
  for(const value of flavors){
    const option = document.createElement('option');
    option.value = value;
    option.textContent = value || 'None';
    chordFlavorSelect.appendChild(option);
  }
  chordFlavorSelect.value = flavors.includes(current) ? current : '';
  chordPreview.textContent = getChordText();
}

function parseChordPcs(chord){
  const clean = chord.split('/')[0];
  const m = clean.match(/^([A-G])([#b]?)(.*)$/);
  if(!m) return [0,4,7];

  let root = LETTER_PC[m[1]];
  if(m[2] === '#') root++;
  if(m[2] === 'b') root--;
  root = mod(root,12);

  const rest = m[3];

  let rule = CHORD_RULES.maj;
  let bestLen = -1;
  for(const r of Object.values(CHORD_RULES)){
    if(rest.startsWith(r.symbol) && r.symbol.length > bestLen){
      rule = r;
      bestLen = r.symbol.length;
    }
  }

  let ints = [...rule.pcs];

  if(rest.includes('13')) ints.push(21);
  else if(rest.includes('11')) ints.push(17);
  else if(rest.includes('9')) ints.push(14);
  else if(rest.includes('2')) ints.push(2);
  if(rest.includes('6')) ints.push(9);
  if(rest.includes('add2')) ints.push(2);
  if(rest.includes('add4')) ints.push(5);
  if(rest.includes('add9')) ints.push(14);
  if(rest.includes('b9')) ints.push(13);
  if(rest.includes('#9')) ints.push(15);
  if(rest.includes('#11')) ints.push(18);
  if(rest.includes('b13')) ints.push(20);

  return [...new Set(ints.map(i=>mod(root+i,12)))];
}

function effectiveChord(event){
  let c = state.keyRoot + (state.keyMode === 'minor' ? 'm' : '');
  for(const e of [...state.events].sort((a,b)=>a.startBeat-b.startBeat || a.id-b.id)){
    if(e.startBeat > event.startBeat) break;
    if(e.chord) c = e.chord;
  }
  return c;
}

function candidates(pcs, min, max){
  const out = [];
  for(let m=min; m<=max; m++){
    if(pcs.includes(mod(m,12))) out.push(m);
  }
  return out;
}

function chooseBest(arr, score){
  if(!arr.length) return null;
  let best = arr[0], bestScore = Infinity;
  for(const x of arr){
    const s = score(x);
    if(s < bestScore){ best=x; bestScore=s; }
  }
  return best;
}
